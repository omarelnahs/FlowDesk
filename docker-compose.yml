services: 
  postgres: 
    image: ankane/pgvector:latest
    container_name: flowdesk_postgres
    environment: 
      POSTGRES_DB: flowdesk
      POSTGRES_USER: flowdesk
      POSTGRES_PASSWORD: flowdesk_dev_pw
    ports: 
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U flowdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis: 
    image: redis:7-alpine
    container_name: flowdesk_redis
    ports: 
      - "6379:6379"
    command: redis-server --requirepass flowdesk_redis_pw
    volumes: 
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: